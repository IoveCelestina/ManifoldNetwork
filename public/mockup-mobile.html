<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<title>Manifold · 移动端设计稿</title>
<link rel="stylesheet" href="/mockup-mobile.css">
</head>
<body>
<div class="app" id="app">

  <!-- ░░ 顶栏：菜单 / 模型(居中) / 新建 ░░ -->
  <header class="topbar">
    <button class="icon-btn" data-action="drawer-open" aria-label="菜单">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    </button>
    <button class="model-pill" id="model-pill" data-action="sheet-open">
      <span class="mn" id="model-name">gpt-5.5</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <button class="icon-btn" aria-label="新对话">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
    </button>
  </header>

  <!-- ░░ 消息区 ░░ -->
  <div class="scroll">
    <div class="messages" id="messages">
      <div class="thread-chat">
        <div class="msg msg-user"><div class="body">你好</div></div>
        <div class="msg msg-assistant">
          <div class="role"><span class="role-glyph">∴</span><span class="role-name">gpt-5.5</span></div>
          <div class="body">你好！😊 有什么我可以帮你的吗？</div>
        </div>
        <div class="msg msg-user"><div class="body">帮我把这段话润色得更正式一点</div></div>
        <div class="msg msg-assistant">
          <div class="role"><span class="role-glyph">∴</span><span class="role-name">gpt-5.5</span></div>
          <div class="body">当然，请把需要润色的文字发给我，我会在保留原意的前提下调整措辞，使其更书面、更得体。</div>
        </div>
      </div>
      <div class="thread-image hidden">
        <div class="msg msg-user"><div class="body">一只在霓虹城市夜景里的机械猫，赛博朋克风格</div></div>
        <div class="msg msg-assistant is-image">
          <div class="role"><span class="role-glyph">◷</span><span class="role-name">gpt-image-2 · 1024×1024</span></div>
          <div class="body"><div class="gen-img"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ░░ 输入区 ░░ -->
  <div class="composer-zone">
    <div class="composer">
      <!-- 生图参数：独立一行，在输入框上方，绝不挡输入 -->
      <div class="gen-tools">
        <button class="tool-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
          1024×1024
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <button class="tool-pill">
          质量·自动
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
      <!-- 输入行 -->
      <div class="composer-row">
        <button class="attach-btn" aria-label="附件">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <textarea class="ta" id="ta" rows="1" placeholder="输入消息…"></textarea>
        <button class="send-btn" aria-label="发送">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ░░ 抽屉 ░░ -->
  <div class="scrim" data-action="drawer-close"></div>
  <aside class="drawer">
    <div class="dw-brand">
      <svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="19"/><ellipse cx="24" cy="24" rx="19" ry="11"/><ellipse cx="24" cy="24" rx="19" ry="4.5"/></svg>
      <b>Manifold</b>
    </div>
    <button class="dw-new"><b>+</b> 新对话</button>
    <nav class="dw-list">
      <div class="dw-item active">你好（润色请求）</div>
      <div class="dw-item">赛博朋克机械猫 生图</div>
      <div class="dw-item">CSV 数据分析</div>
      <div class="dw-item">周报草稿润色</div>
      <div class="dw-item">Python 报错排查</div>
      <div class="dw-item">英文邮件翻译</div>
    </nav>
    <div class="dw-foot">
      <div class="dw-acct">
        <span class="dot"></span>
        <span class="who">you@example.com</span>
        <button class="gear" aria-label="设置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
      <!-- 账号 + Key 都收进抽屉，顶栏不再塞 -->
      <div class="dw-key"><span class="k-dot"></span>当前 Key · rqy ····3f2a</div>
    </div>
  </aside>

  <!-- ░░ 模型选择底部弹层 ░░ -->
  <div class="sheet-scrim" data-action="sheet-close"></div>
  <div class="sheet">
    <div class="sheet-grip"></div>
    <div class="sheet-title">选择模型</div>
    <button class="mdl is-chat sel" data-model="gpt-5.5" data-kind="chat">
      <span class="m-dot"></span>
      <span class="m-main"><div class="m-name">gpt-5.5</div><div class="m-desc">对话 · 最强通用</div></span>
      <span class="m-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
    </button>
    <button class="mdl is-chat" data-model="claude-opus-4-8" data-kind="chat">
      <span class="m-dot"></span>
      <span class="m-main"><div class="m-name">claude-opus-4-8</div><div class="m-desc">对话 · 长上下文</div></span>
      <span class="m-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
    </button>
    <button class="mdl is-image" data-model="gpt-image-2" data-kind="image">
      <span class="m-dot"></span>
      <span class="m-main"><div class="m-name">gpt-image-2</div><div class="m-desc">生图 · 文生图 / 识图参考</div></span>
      <span class="m-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
    </button>
  </div>

</div>

<!-- 设计稿专用预览切换（真应用不会有） -->
<div class="preview-tag">设计稿 · 非真应用</div>
<div class="preview-bar">
  <button id="pv-chat" class="on" data-action="preview-chat">对话</button>
  <button id="pv-image" data-action="preview-image">生图</button>
  <button data-action="drawer-open">抽屉</button>
  <button data-action="sheet-open">模型</button>
</div>

<script src="/mockup-mobile.js"></script>
</body>
</html>
